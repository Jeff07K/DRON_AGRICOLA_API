<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dron Agrícola — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0b0f14;
    --surface:   #111820;
    --border:    #1e2d3d;
    --accent:    #00d4aa;
    --accent2:   #ff6b35;
    --accent3:   #4fa3ff;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --danger:    #ef4444;
    --success:   #22c55e;
    --mono:      'Space Mono', monospace;
    --sans:      'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span { color: var(--muted); }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
    margin-right: 8px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .header-right {
    display: flex; align-items: center; gap: 16px;
    font-size: 12px; color: var(--muted); font-family: var(--mono);
  }

  /* ── Layout ── */
  main { max-width: 1280px; margin: 0 auto; padding: 32px; }
  h2 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── KPI Cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 16px;
    position: relative;
    overflow: hidden;
  }
  .kpi::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
  }
  .kpi:nth-child(2)::before { background: var(--accent2); }
  .kpi:nth-child(3)::before { background: var(--accent3); }
  .kpi:nth-child(4)::before { background: #a78bfa; }
  .kpi:nth-child(5)::before { background: #fbbf24; }
  .kpi:nth-child(6)::before { background: var(--success); }
  .kpi-label {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 8px; font-family: var(--mono);
  }
  .kpi-value {
    font-size: 28px; font-weight: 600;
    font-family: var(--mono); color: var(--text);
    line-height: 1;
  }
  .kpi-unit {
    font-size: 11px; color: var(--muted); margin-top: 4px;
  }

  /* ── Tabla ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .table-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .table-title {
    font-family: var(--mono); font-size: 12px;
    color: var(--accent); letter-spacing: 2px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    border: 1px solid;
    transition: all .2s;
    text-decoration: none;
  }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #0b0f14; font-weight: 700;
  }
  .btn-accent:hover { opacity: .85; }
  .btn-outline {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: transparent;
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn-danger:hover { background: var(--danger); color: white; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #0d1620;
    padding: 10px 16px;
    font-family: var(--mono); font-size: 10px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    text-align: left; border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: rgba(0,212,170,.04); }
  tbody td {
    padding: 10px 16px; font-size: 13px;
    font-family: var(--mono); color: var(--text);
  }
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 11px; font-family: var(--mono);
    background: rgba(0,212,170,.1); color: var(--accent);
    border: 1px solid rgba(0,212,170,.2);
  }
  .empty-state {
    text-align: center; padding: 48px;
    color: var(--muted); font-family: var(--mono); font-size: 12px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 20px;
    font-family: var(--mono); font-size: 12px;
    display: none; z-index: 999;
  }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error   { border-color: var(--danger);  color: var(--danger);  }

  /* ── Spinner ── */
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Stat grid ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px; margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .stat-title {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); letter-spacing: 1px; margin-bottom: 12px;
  }
  .stat-row {
    display: flex; justify-content: space-between;
    padding: 5px 0; border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-key { color: var(--muted); font-family: var(--mono); }
  .stat-val { color: var(--text); font-family: var(--mono); font-weight: 700; }
</style>
</head>
<body>

<header>
  <div class="logo">DRON<span>/</span>AGRÍCOLA <span>· DASHBOARD</span></div>
  <div class="header-right">
    <span><span class="status-dot"></span>API ONLINE</span>
    <span id="last-update">—</span>
  </div>
</header>

<main>
  <!-- KPI Row -->
  <h2>Resumen</h2>
  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi"><div class="kpi-label">Total registros</div><div class="kpi-value" id="kpi-total">—</div></div>
    <div class="kpi"><div class="kpi-label">Media Accel X</div><div class="kpi-value" id="kpi-ax">—</div><div class="kpi-unit">m/s²</div></div>
    <div class="kpi"><div class="kpi-label">Media Accel Y</div><div class="kpi-value" id="kpi-ay">—</div><div class="kpi-unit">m/s²</div></div>
    <div class="kpi"><div class="kpi-label">Media Accel Z</div><div class="kpi-value" id="kpi-az">—</div><div class="kpi-unit">m/s²</div></div>
    <div class="kpi"><div class="kpi-label">Media Gyro X</div><div class="kpi-value" id="kpi-gx">—</div><div class="kpi-unit">rad/s</div></div>
    <div class="kpi"><div class="kpi-label">Disparos</div><div class="kpi-value" id="kpi-disparos">—</div></div>
  </div>

  <!-- Estadísticas -->
  <h2>Estadística descriptiva</h2>
  <div class="stat-grid" id="stat-grid">
    <div class="empty-state">Cargando estadísticas...</div>
  </div>

  <!-- Tabla de datos -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">// REGISTROS DEL SENSOR MPU6050</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" onclick="loadData()">↺ Actualizar</button>
        <a class="btn btn-accent" href="/api/export-excel" download>⬇ Exportar Excel</a>
        <button class="btn btn-danger" onclick="confirmDeleteAll()">✕ Limpiar BD</button>
      </div>
    </div>
    <div id="table-container">
      <div class="empty-state"><span class="spinner"></span></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;

async function loadData() {
  try {
    const res = await fetch(`${API}/api/sensor-data`);
    const data = await res.json();
    renderTable(data);
    renderKPIs(data);
    renderStats(data);
    document.getElementById('last-update').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString();
  } catch(e) {
    showToast('Error al cargar datos: ' + e.message, 'error');
  }
}

function renderTable(data) {
  const container = document.getElementById('table-container');
  if (!data.length) {
    container.innerHTML = '<div class="empty-state">Sin registros aún. Conecta la ESP32 y activa la app.</div>';
    return;
  }
  const rows = data.map(r => `
    <tr>
      <td><span class="badge">#${r.id}</span></td>
      <td>${r.timestamp?.replace('T',' ').substring(0,19) || '—'}</td>
      <td>${r.disparo}</td>
      <td>${r.accel_x.toFixed(4)}</td>
      <td>${r.accel_y.toFixed(4)}</td>
      <td>${r.accel_z.toFixed(4)}</td>
      <td>${r.gyro_x.toFixed(4)}</td>
      <td>${r.gyro_y.toFixed(4)}</td>
      <td>${r.gyro_z.toFixed(4)}</td>
      <td><button class="btn btn-danger" style="padding:4px 10px" onclick="deleteRecord(${r.id})">✕</button></td>
    </tr>`).join('');
  container.innerHTML = `
    <table>
      <thead><tr>
        <th>ID</th><th>Timestamp</th><th>Disparo</th>
        <th>Accel X</th><th>Accel Y</th><th>Accel Z</th>
        <th>Gyro X</th><th>Gyro Y</th><th>Gyro Z</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderKPIs(data) {
  const n = data.length;
  if (!n) return;
  const avg = key => (data.reduce((s,r) => s + r[key], 0) / n).toFixed(3);
  const disparos = new Set(data.map(r => r.disparo)).size;
  document.getElementById('kpi-total').textContent = n;
  document.getElementById('kpi-ax').textContent = avg('accel_x');
  document.getElementById('kpi-ay').textContent = avg('accel_y');
  document.getElementById('kpi-az').textContent = avg('accel_z');
  document.getElementById('kpi-gx').textContent = avg('gyro_x');
  document.getElementById('kpi-disparos').textContent = disparos;
}

function renderStats(data) {
  if (!data.length) return;
  const vars = ['accel_x','accel_y','accel_z','gyro_x','gyro_y','gyro_z'];
  const labels = {'accel_x':'Accel X','accel_y':'Accel Y','accel_z':'Accel Z',
                   'gyro_x':'Gyro X','gyro_y':'Gyro Y','gyro_z':'Gyro Z'};
  const cards = vars.map(v => {
    const vals = data.map(r => r[v]);
    const n = vals.length;
    const media = vals.reduce((a,b) => a+b,0)/n;
    const varianza = vals.reduce((s,x) => s+(x-media)**2, 0)/n;
    const desv = Math.sqrt(varianza);
    return `
      <div class="stat-card">
        <div class="stat-title">// ${labels[v]}</div>
        <div class="stat-row"><span class="stat-key">Media</span><span class="stat-val">${media.toFixed(4)}</span></div>
        <div class="stat-row"><span class="stat-key">Varianza</span><span class="stat-val">${varianza.toFixed(6)}</span></div>
        <div class="stat-row"><span class="stat-key">Desv. Est.</span><span class="stat-val">${desv.toFixed(4)}</span></div>
        <div class="stat-row"><span class="stat-key">Mínimo</span><span class="stat-val">${Math.min(...vals).toFixed(4)}</span></div>
        <div class="stat-row"><span class="stat-key">Máximo</span><span class="stat-val">${Math.max(...vals).toFixed(4)}</span></div>
      </div>`;
  }).join('');
  document.getElementById('stat-grid').innerHTML = cards;
}

async function deleteRecord(id) {
  if (!confirm(`¿Eliminar registro #${id}?`)) return;
  await fetch(`${API}/api/sensor-data/${id}`, {method:'DELETE'});
  showToast(`Registro #${id} eliminado`, 'success');
  loadData();
}

async function confirmDeleteAll() {
  if (!confirm('⚠️ ¿Eliminar TODOS los registros? Esta acción no se puede deshacer.')) return;
  const res = await fetch(`${API}/api/sensor-data`, {method:'DELETE'});
  const msg = await res.json();
  showToast(msg.message, 'success');
  loadData();
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// Cargar al iniciar y refrescar cada 15 segundos
loadData();
setInterval(loadData, 15000);
</script>
</body>
</html>
